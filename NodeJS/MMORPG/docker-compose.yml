services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_mmorpg
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=minhapassword
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: